name: Container
machineName: container
status: true
props:
  properties:
    # --- Tab 1: Layout & Style ---
    backgroundColor:
      title: Color
      type: string
      examples:
        - '#f5f2eb'
    backgroundImage:
      title: Background image
      type: object
      examples:
        - src: https://placehold.co/1920x600@2x.png
          alt: Container background
          width: 1920
          height: 600
      $ref: json-schema-definitions://canvas.module/image
    imageOverlay:
      title: Select
      type: string
      enum:
        - None
        - Dark
        - Light
      examples:
        - None
    border:
      title: Select
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    paddingTop:
      title: Padding top
      type: string
      enum:
        - None
        - Small (32px)
        - Medium (64px)
        - Large (96px)
      examples:
        - None
    paddingBottom:
      title: Padding bottom
      type: string
      enum:
        - None
        - Small (32px)
        - Medium (64px)
        - Large (96px)
      examples:
        - None
    heightBehavior:
      title: Select
      type: string
      enum:
        - Fit to content (or minimum height set)
        - Fill space available
      examples:
        - Fit to content (or minimum height set)
    minHeightDesktop:
      title: Minimum height desktop
      type: number
      examples:
        - 0
    minHeightTablet:
      title: Minimum height tablet
      type: number
      examples:
        - 0
    minHeightPhone:
      title: Minimum height phone
      type: number
      examples:
        - 0
    verticalAlignment:
      title: Select
      type: string
      enum:
        - Top
        - Middle
        - Bottom
      examples:
        - Top
    addSpaceBelow:
      title: Select
      type: string
      enum:
        - None
        - Add space below
      examples:
        - None
slots:
  content:
    title: Content
