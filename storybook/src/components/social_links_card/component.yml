name: Social links card
machineName: social_links_card
status: true
props:
  properties:
    # --- Tab 1 ---
    label:
      title: Label
      type: string
      examples:
        - Follow us
    links:
      title: Links
      type: array
      items:
        type: object
        properties:
          platform:
            title: Platform
            type: string
            enum:
              - facebook
              - twitter
              - linkedin
              - youtube
              - vimeo
              - instagram
              - medium
              - pinterest
              - rss
              - behance
              - drupal
              - github
              - xing
              - bitbucket
              - whatsapp
              - slideshare
              - flickr
              - vkontakte
              - tumblr
              - tiktok
          url:
            title: Link to social network page
            type: string
      examples:
        - - platform: instagram
            url: https://www.instagram.com/iolla
          - platform: facebook
            url: https://www.facebook.com/iolla
    # --- Tab 2 ---
    backgroundColor:
      title: Background color
      type: string
      examples:
        - '#ffffff'
    textColor:
      title: Text color
      type: string
      enum:
        - Dark text
        - Light text
      examples:
        - Dark text
    iconStyle:
      title: Icon style
      type: string
      enum:
        - Color icons
        - Dark icons
        - Light icons
      examples:
        - Color icons
    conditionalTextColorLightBackground:
      title: Conditional text color light background
      type: string
      examples:
        - ''
    conditionalTextColorDarkBackground:
      title: Conditional text color dark background
      type: string
      examples:
        - ''
    conditionalTextColorColoredBackground:
      title: Conditional text color colored background
      type: string
      examples:
        - ''
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    padding:
      title: Padding
      type: string
      enum:
        - None
        - Apply padding to card
      examples:
        - None
    conditionallyApplyPadding:
      title: Conditionally apply padding
      type: string
      examples:
        - ''
    height:
      title: Height
      type: string
      enum:
        - Fit to content
        - Fill space available
      examples:
        - Fill space available
    addSpaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - Add space below
slots: []
