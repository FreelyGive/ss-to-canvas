name: Logo card
machineName: logo_card
status: true
props:
  properties:
    # --- Tab 1 ---
    image:
      title: Image (logo)
      type: object
      examples:
        - src: https://placehold.co/200x80@2x.png
          alt: Partner logo
          width: 200
          height: 80
      $ref: json-schema-definitions://canvas.module/image
    altTag:
      title: Alt tag
      type: string
      examples:
        - Partner logo
    link:
      title: Link to page or URL
      type: object
      examples:
        - url: /partner
          target: _self
    # --- Tab 2 ---
    backgroundColor:
      title: Background color
      type: string
      examples:
        - '#ffffff'
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - Add border
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    spaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - Add space below
