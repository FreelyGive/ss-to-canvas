name: Hero with Mobile Video
machineName: hero_image_video
status: true
required:
  - layout
  - height
  - textColor
  - headingTextColor
props:
  properties:
    # --- Tab 1: Content ---
    usePageTitle:
      title: Use Page Title
      type: boolean
      examples:
        - false
    pageTitle:
      title: Page Title
      type: string
      examples:
        - Glasses
        - Sunglasses
        - Showrooms
        - We design quality glasses at an upfront, honest price
        - Virtual Try On
    preHeading:
      title: Pre Heading
      type: string
      examples:
        - New Collection
    heading:
      title: Heading
      type: string
      examples:
        - Life in focus.
    text:
      title: Text
      type: string
      contentMediaType: text/html
      examples:
        - <p>Shop the latest eyewear from iolla.</p>
    buttonLink:
      title: Link to Page or URL
      type: string
      examples:
        - /collections/glasses
        - /collections/sunglasses
        - /showrooms
        - /our-story
        - https://support.iolla.com/
    buttonText:
      title: Button Text
      type: string
      examples:
        - Shop now
    buttonTarget:
      title: Target
      type: string
      enum:
        - _self
        - _blank
      examples:
        - _self
    buttonStyle:
      title: Button Style
      type: string
      enum:
        - Link with icon
        - Primary button blue
        - Primary button dark blue
        - Primary button green
        - Primary button orange
        - Secondary button blue
        - Secondary button dark blue
        - Secondary button green
        - Secondary button orange
        - Primary button cream
        - Primary button dark red
      examples:
        - Primary button dark blue
    showBreadcrumbs:
      title: Show Breadcrumbs
      type: string
      enum:
        - None
        - Show breadcrumbs on transparent background
        - Show breadcrumbs on solid dark background
        - Show breadcrumbs on solid light background
        - Show breadcrumbs on semi-transparent dark background
      examples:
        - None
    # --- Tab 2: Layout & Style ---
    height:
      title: Hero Height
      type: string
      enum:
        - Fluid
        - Tall
        - Short
      examples:
        - Short
    layout:
      title: Text and Drop Zone Layout
      type: string
      enum:
        - Left aligned
        - Right aligned
        - Centered
      examples:
        - Left aligned
    textVerticalAlignment:
      title: Text Vertical Alignment
      type: string
      enum:
        - Top
        - Center
        - Bottom
      examples:
        - Center
    enableDropZone:
      title: Enable Drop Zone
      type: boolean
      examples:
        - false
    imageOverlay:
      title: Background Overlay
      type: string
      enum:
        - None
        - Dark overlay
        - Light overlay
      examples:
        - None
    backgroundVideo:
      title: Background Video URL
      type: string
      examples:
        - https://www.w3schools.com/html/mov_bbb.mp4
    headingTextColor:
      title: Heading Text Color
      type: string
      enum:
        - Light
        - Dark
        - Colored
      examples:
        - Light
    textColor:
      title: Text Color
      type: string
      enum:
        - Light
        - Dark
      examples:
        - Light
    # --- Heading element (form-input-hidden, affects heading tag) ---
    headingElement:
      title: Heading Element
      type: string
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      examples:
        - h1
slots:
  dropZoneContent:
    title: Drop Zone Content
