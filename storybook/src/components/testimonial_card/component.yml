name: Testimonial card
machineName: testimonial_card
status: true
props:
  properties:
    # --- Tab 1 ---
    quote:
      title: Quote
      type: string
      examples:
        - The service was exceptional. My new glasses are perfect and the team made the whole process effortless.
    headingElement:
      title: Heading element
      type: string
      enum:
        - h2
        - h3
        - h4
        - h5
        - h6
      examples:
        - h3
    name:
      title: Name
      type: string
      examples:
        - Sarah Thompson
    occupation:
      title: Occupation
      type: string
      examples:
        - Marketing Director
    organization:
      title: Organization
      type: string
      examples:
        - Acme Ltd
    image:
      title: Image
      type: string
      examples:
        - https://placehold.co/80x80@2x.png
    altTag:
      title: Alt tag
      type: string
      examples:
        - Testimonial author photo
    # --- Tab 2 ---
    backgroundColor:
      title: Background color
      type: string
      examples:
        - ''
    textColor:
      title: Text color
      type: string
      enum:
        - Dark text
        - Light text
      examples:
        - Dark text
    conditionalTextColorLightBackground:
      title: Conditional text color light background
      type: string
      examples:
        - ''
    conditionalTextColorDarkBackground:
      title: Conditional text color dark background
      type: string
      examples:
        - ''
    conditionalTextColorColoredBackground:
      title: Conditional text color colored background
      type: string
      examples:
        - ''
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - ''
    padding:
      title: Padding
      type: string
      enum:
        - None
        - Apply padding to card
      examples:
        - None
    conditionallyApplyPadding:
      title: Conditionally apply padding
      type: string
      examples:
        - ''
    height:
      title: Height
      type: string
      enum:
        - Fit to content
        - Fill space available
      examples:
        - Fill space available
    addSpaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - None
slots: []
