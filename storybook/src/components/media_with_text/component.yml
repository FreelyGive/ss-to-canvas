name: Media With Text
machineName: media_with_text
status: true
required:
  - heading
  - mediaType
props:
  properties:
    mediaType:
      title: Media Type
      type: string
      enum:
        - Video Embed
        - Image
      examples:
        - Video Embed
    videoEmbedUrl:
      title: Video Embed URL (iframe src)
      type: string
      examples:
        - https://player.vimeo.com/video/123456?background=1&muted=1&autoplay=1&loop=1
    image:
      title: Image
      type: object
      $ref: json-schema-definitions://canvas.module/image
    mediaPosition:
      title: Media Position
      type: string
      enum:
        - Left
        - Right
      examples:
        - Left
    theme:
      title: Theme
      type: string
      enum:
        - Dark
        - Light
      examples:
        - Dark
    preHeading:
      title: Pre Heading
      type: string
    heading:
      title: Heading
      type: string
      examples:
        - Prescription sunglasses, without the usual faff.
    text:
      title: Body Text
      type: string
      contentMediaType: text/html
      x-formatting-context: block
    bulletItems:
      title: Bullet Items (one per line)
      type: string
      contentMediaType: text/plain
    primaryLinkUrl:
      title: Primary Link URL
      type: string
    primaryLinkLabel:
      title: Primary Link Label
      type: string
    secondaryLinkUrl:
      title: Secondary Link URL
      type: string
    secondaryLinkLabel:
      title: Secondary Link Label
      type: string
slots: []
