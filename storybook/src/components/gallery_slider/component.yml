name: Gallery slider
machineName: gallery_slider
status: true
props:
  properties:
    # --- Tab 1 ---
    sliderId:
      title: Slider ID
      type: string
      examples:
        - gallery-1
    images:
      title: Images
      type: array
      items:
        type: object
        properties:
          image:
            type: object
            $ref: json-schema-definitions://canvas.module/image
          altTag:
            type: string
      examples:
        - - image:
              src: https://placehold.co/768x512@2x.png
              alt: Gallery image 1
              width: 768
              height: 512
            altTag: Gallery image 1
          - image:
              src: https://placehold.co/768x512@2x.png
              alt: Gallery image 2
              width: 768
              height: 512
            altTag: Gallery image 2
    # --- Tab 2 ---
    imageSize:
      title: Select
      type: string
      enum:
        - XX Large landscape (1600x1067)
        - X Large landscape (1200x800)
        - Large landscape (1024x683)
        - Medium landscape (768x512)
        - Small landscape (568x352)
        - X Small landscape (480x320)
      examples:
        - Medium landscape (768x512)
    desktopThumbnails:
      title: Desktop thumbnails
      type: string
      enum:
        - '3'
        - '5'
        - '7'
      examples:
        - '5'
    tabletThumbnails:
      title: Tablet thumbnails
      type: string
      enum:
        - '3'
        - '5'
        - '7'
      examples:
        - '5'
    phoneThumbnails:
      title: Phone thumbnails
      type: string
      enum:
        - '3'
        - '5'
      examples:
        - '3'
    addSpaceBelow:
      title: Select
      type: string
      enum:
        - None
        - Add space below
      examples:
        - None
