name: Row for columns
machineName: row_for_columns
status: true
props:
  properties:
    # --- Tab 1 ---
    width:
      title: Width
      type: string
      enum:
        - Full width
        - Boxed width
      examples:
        - Boxed width
    columnAlignment:
      title: Column alignment
      type: string
      enum:
        - Distribute columns evenly
        - Left
        - Right
        - Center
      examples:
        - Center
    spaceBetweenColumns:
      title: Space between columns
      type: string
      enum:
        - Add space between
        - No space between
      examples:
        - Add space between
    padding:
      title: Padding
      type: string
      enum:
        - None
        - Top and bottom large
        - Top and bottom medium
        - Top and bottom small
        - Top only large
        - Top only medium
        - Top only small
        - Bottom only large
        - Bottom only medium
        - Bottom only small
      examples:
        - None
    # --- Tab 2 ---
    backgroundColor:
      title: Background color
      type: string
      examples:
        - '#ffffff'
    backgroundImageDesktop:
      title: Background image (desktop)
      type: object
      examples:
        - src: https://placehold.co/1920x600@2x.png
          alt: Row background
          width: 1920
          height: 600
      $ref: json-schema-definitions://canvas.module/image
    alternativeImageForPhone:
      title: Alternative image for phone
      type: boolean
      examples:
        - false
    backgroundImageMobile:
      title: Background image (mobile)
      type: object
      examples:
        - src: https://placehold.co/768x400@2x.png
          alt: Row background mobile
          width: 768
          height: 400
      $ref: json-schema-definitions://canvas.module/image
slots:
  columns:
    title: Columns
