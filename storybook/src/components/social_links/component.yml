name: Social links
machineName: social_links
status: true
props:
  properties:
    # --- Tab 1 ---
    links:
      title: Links
      type: array
      items:
        type: object
        properties:
          platform:
            title: Platform
            type: string
            enum:
              - facebook
              - twitter
              - linkedin
              - youtube
              - vimeo
              - instagram
              - medium
              - pinterest
              - rss
              - behance
              - drupal
              - github
              - xing
              - bitbucket
              - whatsapp
              - slideshare
              - flickr
              - vkontakte
              - tumblr
              - tiktok
          url:
            title: Link to social network page
            type: string
          ariaLabel:
            title: ARIA label
            type: string
      examples:
        - - platform: instagram
            url: https://www.instagram.com/iolla
            ariaLabel: Follow iolla on Instagram
          - platform: facebook
            url: https://www.facebook.com/iolla
            ariaLabel: Follow iolla on Facebook
slots: []
