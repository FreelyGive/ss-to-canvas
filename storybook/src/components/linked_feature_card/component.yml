name: Linked feature card
machineName: linked_feature_card
status: true
props:
  properties:
    # --- Tab 1 ---
    image:
      title: Image
      type: object
      examples:
        - src: https://placehold.co/80x80@2x.png
          alt: Card image
          width: 80
          height: 80
      $ref: json-schema-definitions://canvas.module/image
    altTag:
      title: Alt tag
      type: string
      examples:
        - Card image
    headingElement:
      title: Heading element
      type: string
      enum:
        - Heading 2
        - Heading 3
        - Heading 4
        - Heading 5
        - Heading 6
      examples:
        - Heading 3
    cardHeading:
      title: Card heading
      type: string
      examples:
        - Our Glasses
    description:
      title: Description
      type: string
      examples:
        - Browse our extensive collection of frames for every face shape and style.
    callToAction:
      title: Call to action
      type: string
      examples:
        - Shop now
    link:
      title: Link to page or URL
      type: object
      examples:
        - url: /glasses
          target: _self
    buttonStyle:
      title: Button style
      type: string
      enum:
        - Primary button blue
        - Primary button green
        - Primary button orange
        - Secondary button blue
        - Secondary button green
        - Secondary button orange
      examples:
        - Primary button blue
    # --- Tab 2 ---
    layout:
      title: Layout
      type: string
      enum:
        - Left aligned with image above text
        - Left aligned with image left of text
        - Center aligned with image above text
      examples:
        - Left aligned with image above text
    backgroundColor:
      title: Background color
      type: string
      examples:
        - '#ffffff'
    textColor:
      title: Text color
      type: string
      enum:
        - Dark text
        - Light text
      examples:
        - Dark text
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    roundEdges:
      title: Round edges
      type: string
      enum:
        - None
        - Add round edges
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    padding:
      title: Padding
      type: string
      enum:
        - None
        - Apply padding to card
      examples:
        - None
    conditionallyApplyPadding:
      title: Conditionally apply padding
      type: string
      examples:
        - ''
    height:
      title: Height
      type: string
      enum:
        - Fit to content
        - Fill space available
      examples:
        - Fill space available
    spaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - Add space below
