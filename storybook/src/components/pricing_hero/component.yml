name: Pricing Hero
machineName: pricing_hero
status: true
required:
  - preHeading
  - heading
props:
  properties:
    preHeading:
      title: Pre Heading
      type: string
      examples:
        - Our pricing
    heading:
      title: Heading
      type: string
      examples:
        - One fair price vs a whole world of complexity.
    intro:
      title: Intro Text
      type: string
      examples:
        - We price the pair, not the parts.
    leftPrice:
      title: Left Card Price
      type: string
      examples:
        - £85
    leftSubtitle:
      title: Left Card Subtitle
      type: string
      examples:
        - Complete prescription glasses - The IOLLA Way
    leftItems:
      title: Left Card Items (one per line)
      type: string
      contentMediaType: text/plain
      examples:
        - "Frames of your choice\nPrescription lenses included\nAnti-reflective coating included"
    leftVerdict:
      title: Left Card Verdict
      type: string
      examples:
        - Genuinely. That's it.
    rightPrice:
      title: Right Card Price
      type: string
      examples:
        - £300+
    rightSubtitle:
      title: Right Card Subtitle
      type: string
      examples:
        - What a "starting price" can become
    rightItems:
      title: Right Card Items (one per line)
      type: string
      contentMediaType: text/plain
      examples:
        - "Prescription lenses (sold separately)\nAnti-reflective coating (add-on)\nThinner lenses (premium upgrade)"
    rightVerdict:
      title: Right Card Verdict
      type: string
      examples:
        - The price grows without your control
slots: []
