name: Hero with Mobile Image
machineName: cpt_hero_image_mobile
status: true
required:
  - layout
  - height
  - textVerticalAlignment
  - imageOverlay
  - imageStyleDesktop
  - imageStyleMobile
  - headingTextColor
  - textColor
props:
  properties:
    # --- Tab 1: Content ---
    usePageTitle:
      title: Use Page Title
      type: boolean
      examples:
        - false
    pageTitle:
      title: Page Title
      type: string
      examples:
        - Glasses
        - Sunglasses
        - Showrooms
    preHeading:
      title: Pre Heading
      type: string
      examples:
        - Born in Scotland
        - New Collection
    heading:
      title: Heading
      type: string
      examples:
        - A better way to buy eyewear.
        - Life in focus.
    headingElement:
      title: Heading Element
      type: string
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
      examples:
        - h1
    text:
      title: Text
      type: string
      contentMediaType: text/html
      examples:
        - <p>Discover a better way to buy glasses. Honest pricing, expert advice, and frames you'll love.</p>
    buttonLink:
      title: Link to Page or URL
      type: string
      examples:
        - /collections/glasses
        - /collections/sunglasses
        - /showrooms
        - /our-story
        - /virtual-try-on
        - https://support.iolla.com/
    buttonText:
      title: Button Text
      type: string
      examples:
        - Shop glasses
        - Visit a showroom
        - Learn more
    buttonTarget:
      title: Target
      type: string
      enum:
        - _self
        - _blank
      examples:
        - _self
    buttonStyle:
      title: Button Style
      type: string
      enum:
        - Link with icon
        - Primary button blue
        - Primary button dark blue
        - Primary button green
        - Primary button orange
        - Secondary button blue
        - Secondary button dark blue
        - Secondary button green
        - Secondary button orange
      examples:
        - Primary button dark blue
    showBreadcrumbs:
      title: Show Breadcrumbs
      type: string
      enum:
        - None
        - Show breadcrumbs on transparent background
        - Show breadcrumbs on solid dark background
        - Show breadcrumbs on solid light background
        - Show breadcrumbs on semi-transparent dark background
      examples:
        - None
    # --- Tab 2: Layout & Style ---
    height:
      title: Hero Height
      type: string
      enum:
        - Fluid
        - Tall
        - Short
      examples:
        - Short
    layout:
      title: Text and Drop Zone Layout
      type: string
      enum:
        - Text centered - Drop zone below
        - Text left - Drop zone right
        - Text right - Drop zone left
      examples:
        - Text left - Drop zone right
    textVerticalAlignment:
      title: Text Vertical Alignment
      type: string
      enum:
        - Top
        - Center
        - Bottom
      examples:
        - Center
    enableDropZone:
      title: Enable Drop Zone
      type: boolean
      examples:
        - false
    imageOverlay:
      title: Background Overlay
      type: string
      enum:
        - None
        - Dark overlay
        - Light overlay
      examples:
        - None
    backgroundImage:
      title: Desktop Background Image
      type: object
      examples:
        - src: https://iolla.ddev.site/sites/default/files/2021-04/photo-1415731958810-238ff2770b33.jpeg
          alt: iolla hero
      $ref: json-schema-definitions://canvas.module/image
    imageStyleDesktop:
      title: Desktop Image Style
      type: string
      enum:
        - Default (1600x1067)
        - Raw (uncropped)
        - Super wide (1360x640)
        - Lister banner (1980×460)
        - XXL Super wide (1600x800)
      examples:
        - Default (1600x1067)
    mobileImage:
      title: Mobile Background Image
      type: object
      examples:
        - src: https://iolla.ddev.site/sites/default/files/2021-04/photo-1415731958810-238ff2770b33.jpeg
          alt: iolla hero mobile
      $ref: json-schema-definitions://canvas.module/image
    imageStyleMobile:
      title: Mobile Image Style
      type: string
      enum:
        - Default
        - Super wide (568x266)
        - Super duper wide (1360x640)
        - Small square (568x568)
        - Medium portrait (512x768)
        - Uncropped
      examples:
        - Default
    backgroundColor:
      title: Background Color
      type: string
      examples:
        - '#002633'
        - '#f5f2eb'
    headingTextColor:
      title: Heading Text Color
      type: string
      enum:
        - Light
        - Dark
        - Colored
      examples:
        - Light
    textColor:
      title: Text Color
      type: string
      enum:
        - Light
        - Dark
      examples:
        - Light
slots:
  dropZoneContent:
    title: Drop Zone Content
