name: Heading
machineName: heading
status: true
props:
  properties:
    # --- Tab 1 ---
    usePageTitle:
      title: Use page title
      type: boolean
      examples:
        - false
    pageTitle:
      title: Page title
      type: string
      examples:
        - Page Title
    heading:
      title: Heading
      type: string
      examples:
        - Enter a heading...
    headingElement:
      title: Select
      type: string
      enum:
        - H1
        - H2
        - H3
        - H4
        - H5
        - H6
        - Span
      examples:
        - H2
    # --- Tab 2 ---
    sizeOverride:
      title: Select
      type: string
      enum:
        - No override
        - Pre heading
        - XL heading
        - Heading 1 size
        - Heading 2 size
        - Heading 3 size
        - Heading 4 size
        - Heading 5 size
        - Heading 6 size
      examples:
        - No override
    textAlign:
      title: Select
      type: string
      enum:
        - Left
        - Center
        - Right
      examples:
        - Left
    color:
      title: Select
      type: string
      enum:
        - Dark heading
        - Light heading
        - Color heading
      examples:
        - Dark heading
    customColor:
      title: Color
      type: string
      examples:
        - '#006699'
    addSpaceBelow:
      title: Select
      type: string
      enum:
        - None
        - Add space below
      examples:
        - None
