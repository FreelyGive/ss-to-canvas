name: Button(s)
machineName: link_button
status: true
props:
  properties:
    # --- Tab 1 ---
    buttons:
      title: Buttons
      type: array
      items:
        type: object
        properties:
          link:
            title: Link to page or URL
            type: object
            examples:
              - url: /contact
                target: _self
          buttonText:
            title: Button text
            type: string
            examples:
              - Get in touch
          target:
            title: Target
            type: string
            enum:
              - _self
              - _blank
            examples:
              - _self
          buttonStyle:
            title: Button style
            type: string
            enum:
              - Basic link (default)
              - Link with icon
              - Primary button blue
              - Primary button dark blue
              - Primary button green
              - Primary button orange
              - Secondary button blue
              - Secondary button dark blue
              - Secondary button green
              - Secondary button orange
              - Primary button dark red
              - Primary button cream
            examples:
              - Primary button blue
      examples:
        - - link:
              url: /contact
            buttonText: Get in touch
            target: _self
            buttonStyle: Primary button blue
    # --- Tab 2 ---
    align:
      title: Align
      type: string
      enum:
        - Left
        - Center
        - Right
      examples:
        - Left
    desktopLayout:
      title: Desktop layout
      type: string
      enum:
        - Row of links / buttons
        - Column of links / buttons
      examples:
        - Row of links / buttons
    tabletLayout:
      title: Tablet layout
      type: string
      enum:
        - Row of links / buttons
        - Column of links / buttons
      examples:
        - Row of links / buttons
    phoneLayout:
      title: Phone layout
      type: string
      enum:
        - Row of links / buttons
        - Column of links / buttons
      examples:
        - Column of links / buttons
    spaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - Add space below
