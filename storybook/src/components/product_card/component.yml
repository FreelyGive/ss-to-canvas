name: Product card
machineName: product_card
status: true
props:
  properties:
    # --- Tab 1 ---
    product:
      title: Product
      type: object
      properties:
        title:
          type: string
        price:
          type: string
        image:
          type: object
          $ref: json-schema-definitions://canvas.module/image
        url:
          type: string
      examples:
        - title: Round Frame in Black
          price: £95
          image:
            src: https://placehold.co/400x300@2x.png
            alt: Round Frame in Black
            width: 400
            height: 300
          url: /products/round-black
    overlayText:
      title: Overlay Text
      type: string
      examples:
        - New
    textColour:
      title: Text Colour
      type: string
      examples:
        - '#ffffff'
    toggleFeaturedProductCard:
      title: Toggle featured product card
      type: boolean
      examples:
        - false
    # --- Tab 2 ---
    conditionalTextColorLightBackground:
      title: Conditional text color light background
      type: string
      examples:
        - ''
    conditionalTextColorDarkBackground:
      title: Conditional text color dark background
      type: string
      examples:
        - ''
    conditionalTextColorColoredBackground:
      title: Conditional text color colored background
      type: string
      examples:
        - ''
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    height:
      title: Height
      type: string
      enum:
        - Fit to content
        - Fill space available
      examples:
        - Fill space available
    spaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - None
