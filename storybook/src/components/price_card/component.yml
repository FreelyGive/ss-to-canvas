name: Price card
machineName: price_card
status: true
props:
  properties:
    # --- Tab 1 ---
    image:
      title: Image
      type: object
      examples:
        - src: https://placehold.co/400x300@2x.png
          alt: Product image
          width: 400
          height: 300
      $ref: json-schema-definitions://canvas.module/image
    altTag:
      title: Alt tag
      type: string
      examples:
        - Product image
    headingElement:
      title: Heading element
      type: string
      enum:
        - h2
        - h3
        - h4
        - h5
        - h6
      examples:
        - h3
    heading:
      title: Heading
      type: string
      examples:
        - Premium Lenses
    subHeading:
      title: Sub heading
      type: string
      examples:
        - Our most advanced option
    tickListItems:
      title: Tick list items
      type: array
      items:
        type: string
      examples:
        - - Anti-reflective coating
          - UV protection
          - Scratch resistant
    currency:
      title: Currency
      type: string
      examples:
        - £
    price:
      title: Price
      type: string
      examples:
        - "125"
    term:
      title: Term
      type: string
      examples:
        - per pair
    callToAction:
      title: Call to action
      type: string
      examples:
        - Choose this option
    link:
      title: Link to page or URL
      type: string
      examples:
        - /lenses/premium
    # --- Tab 2 ---
    backgroundColor:
      title: Background color
      type: string
      examples:
        - '#ffffff'
    textColor:
      title: Text color
      type: string
      enum:
        - Dark text
        - Light text
      examples:
        - Dark text
    conditionalTextColorLightBackground:
      title: Conditional text color light background
      type: string
      examples:
        - ''
    conditionalTextColorDarkBackground:
      title: Conditional text color dark background
      type: string
      examples:
        - ''
    conditionalTextColorColoredBackground:
      title: Conditional text color colored background
      type: string
      examples:
        - ''
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    padding:
      title: Padding
      type: string
      enum:
        - None
        - Apply padding to card
      examples:
        - None
    conditionallyApplyPadding:
      title: Conditionally apply padding
      type: string
      examples:
        - ''
    spaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - Add space below
