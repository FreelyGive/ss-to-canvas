name: Pricing Card
machineName: pricing_card
status: true
required:
  - heading
  - price
props:
  properties:
    chip:
      title: Chip Label
      type: string
      examples:
        - Our core pair
    heading:
      title: Heading
      type: string
      examples:
        - Complete prescription glasses
    text:
      title: Body Text
      type: string
      examples:
        - Everything in one honest price - nothing more to add.
    price:
      title: Price Display
      type: string
      examples:
        - £85 = everything included
    linkUrl:
      title: Link URL
      type: string
      examples:
        - /collections/glasses
    linkLabel:
      title: Link Label
      type: string
      examples:
        - Shop glasses
    linkVariant:
      title: Link Variant
      type: string
      enum:
        - Solid
        - Outline Dark
        - Outline Light
      examples:
        - Solid
slots: []
