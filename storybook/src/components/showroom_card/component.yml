name: Showroom card
machineName: showroom_card
status: true
props:
  properties:
    # --- Tab 1 ---
    backgroundImage:
      title: Background image
      type: object
      examples:
        - src: https://placehold.co/600x400@2x.png
          alt: Showroom exterior
          width: 600
          height: 400
      $ref: json-schema-definitions://canvas.module/image
    headingElement:
      title: Heading element
      type: string
      enum:
        - h2
        - h3
        - h4
        - h5
        - h6
      examples:
        - h3
    street:
      title: Street
      type: string
      examples:
        - 17 Wilson Street
    city:
      title: City
      type: string
      examples:
        - Glasgow
    description:
      title: Description
      type: string
      examples:
        - Open Mon–Sat 9am–6pm. Appointments available.
    callToAction:
      title: Call to action
      type: string
      examples:
        - Visit showroom
    link:
      title: Link to page or URL
      type: object
      examples:
        - url: /showrooms/glasgow
          title: Visit showroom
    # --- Tab 2 ---
    textColor:
      title: Text color
      type: string
      enum:
        - Light text
        - Dark text
      examples:
        - Light text
    border:
      title: Border
      type: string
      enum:
        - None
        - Add border
      examples:
        - None
    borderColor:
      title: Border color
      type: string
      examples:
        - '#e5e7eb'
    minimumHeight:
      title: Minimum height
      type: string
      enum:
        - Tall
        - Medium
        - Shallow
      examples:
        - Medium
    heightBehavior:
      title: Height behavior
      type: string
      enum:
        - Fit to minimum height
        - Fill space available
      examples:
        - Fill space available
    addSpaceBelow:
      title: Space below
      type: string
      enum:
        - None
        - Add space below
      examples:
        - Add space below
slots: []
