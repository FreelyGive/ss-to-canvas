name: Product lister
machineName: product_lister
status: true
props:
  properties:
    # --- Tab 1 ---
    width:
      title: Width
      type: string
      enum:
        - Boxed width
        - Full width
      examples:
        - Boxed width
    padding:
      title: Padding
      type: string
      enum:
        - None
        - Top and bottom
        - Top only
        - Bottom only
      examples:
        - Top and bottom
    # --- Tab 2 ---
    backgroundColor:
      title: Background color
      type: string
      examples:
        - '#ffffff'
    backgroundImageDesktop:
      title: Background image (desktop)
      type: object
      examples:
        - src: https://placehold.co/1920x600@2x.png
          alt: Background image
          width: 1920
          height: 600
      $ref: json-schema-definitions://canvas.module/image
    alternativeImageForPhone:
      title: Alternative image for phone
      type: boolean
      examples:
        - false
    backgroundImageMobile:
      title: Background image (mobile)
      type: object
      examples:
        - src: https://placehold.co/768x400@2x.png
          alt: Background image mobile
          width: 768
          height: 400
      $ref: json-schema-definitions://canvas.module/image
slots:
  products:
    title: Products
